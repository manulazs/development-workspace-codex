name: Validate Workspace

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Windows healthcheck
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/healthcheck.ps1 -Strict

      - name: Run Windows install dry-run
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/install-workspace.ps1 -Profile full-reviewed -WhatIf

      - name: Validate skill metadata
        shell: bash
        run: |
          python scripts/validate-python-syntax.py scripts/validate-skills.py scripts/evolve-workspace.py scripts/scaffold-capability.py scripts/validate-caveman-lite.py scripts/validate-observations.py scripts/validate-python-syntax.py
          python scripts/validate-skills.py --strict
          python scripts/evolve-workspace.py --strict
          python scripts/validate-observations.py --repo . --strict
          python scripts/scaffold-capability.py skill --name continuous-evolution --purpose "Existing governed evolution workflow." --mode proposal --dry-run

      - name: Validate shell script syntax
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash -n scripts/healthcheck.sh
          bash -n scripts/install-workspace.sh

      - name: Run macOS/Linux healthcheck
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/healthcheck.sh scripts/install-workspace.sh
          scripts/healthcheck.sh --strict

      - name: Run macOS/Linux install dry-run
        if: runner.os != 'Windows'
        shell: bash
        run: |
          scripts/install-workspace.sh --profile full-reviewed --dry-run

      - name: Validate custom agents
        shell: bash
        run: |
          python skills/migrate-to-codex/scripts/cli.py --validate-target .
